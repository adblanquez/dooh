  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ce {\n  font-family: 'Schibsted Grotesk';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"a56f8d83-cc2a-4199-827f-cfa58c38cc9f\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Schibsted Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"baa03696-8257-4c6a-a146-7953bac91665\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Schibsted Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"a56f8d83-cc2a-4199-827f-cfa58c38cc9f\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Schibsted Grotesk';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"baa03696-8257-4c6a-a146-7953bac91665\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Schibsted Grotesk';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"a56f8d83-cc2a-4199-827f-cfa58c38cc9f\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<script src=\"e909ecdd-ddb6-4c6e-8db9-c6b08fb7fad5\" crossorigin=\"anonymous\"><\u002Fscript>\n<script src=\"dc0f8867-6b24-49c3-b04a-30ca9bc9484e\" crossorigin=\"anonymous\"><\u002Fscript>\n<style>\n  html,body{margin:0;padding:0;}\n  *{box-sizing:border-box;}\n  ::selection{background:#4472C4;color:#fff;}\n  @keyframes dooh-fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}\n  @media (prefers-reduced-motion: reduce){ *{transition:none !important; animation:none !important;} }\n<\u002Fstyle>\n\n<\u002Fhelmet>\n<div ref=\"{{ rootRef }}\" style=\"--bg:#EDF0F5;--paper:#FFFFFF;--paper-alt:#E3E8F0;--ink:#00004F;--muted:#5B6478;--faint:#8C93A4;--line:#CBD3E0;--line-strong:#00004F;--accent:#4472C4;--accent2:#ED7D31;--accent-soft:#E4EAF9;min-height:100vh;background:var(--bg,#EDF0F5);color:var(--ink,#00004F);font-family:'Schibsted Grotesk',system-ui,sans-serif;\">\n\n  <div style=\"display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--line,#CBD3E0);background:var(--paper,#fff);\">\n    <div style=\"display:flex;align-items:center;gap:12px;\">\n      <span style=\"width:11px;height:11px;border-radius:50%;background:var(--accent,#4472C4);box-shadow:0 0 0 3px var(--accent-soft,#E4EAF9);\"><\u002Fspan>\n      <h1 style=\"font-size:18px;margin:0;font-family:'Schibsted Grotesk',sans-serif;font-weight:700;letter-spacing:.03em;text-transform:uppercase;\">Panel DOOH<\u002Fh1>\n      <span style=\"color:var(--faint,#8C93A4);font-size:12px;\">· Reporte de campaña<\u002Fspan>\n    <\u002Fdiv>\n    <sc-if value=\"{{ isDashboard }}\" hint-placeholder-val=\"{{ false }}\">\n      <button onclick=\"{{ onReset }}\" style=\"border:1px solid var(--line-strong,#00004F);background:var(--paper,#fff);color:var(--ink,#00004F);padding:9px 16px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Schibsted Grotesk',sans-serif;\">Cambiar archivo<\u002Fbutton>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <!-- ============ UPLOAD ============ -->\n  <sc-if value=\"{{ isUpload }}\" hint-placeholder-val=\"{{ true }}\">\n  <section style=\"max-width:960px;margin:0 auto;padding:64px 24px 96px;\">\n    <span style=\"display:inline-flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent,#4472C4);border:1px solid var(--accent,#4472C4);padding:5px 12px;border-radius:999px;background:var(--accent-soft,#E4EAF9);\">01 — Carga de datos<\u002Fspan>\n    <h2 style=\"font-family:'Schibsted Grotesk',sans-serif;font-weight:700;text-transform:uppercase;font-size:clamp(40px,6vw,64px);line-height:.96;margin:18px 0 12px;\">Sube tu Excel<\u002Fh2>\n    <p style=\"color:var(--muted,#5B6478);font-size:16px;max-width:560px;line-height:1.55;margin:0 0 36px;\">Panel de delivery para campañas DOOH y digital. Impresiones, pantallas y playouts por inventario, hora, día y canal.<\u002Fp>\n\n    <div onclick=\"{{ onPickFile }}\" ondrop=\"{{ onDrop }}\" ondragover=\"{{ onDragOver }}\" ondragleave=\"{{ onDragLeave }}\" style=\"{{ dropStyle }}\">\n      <svg width=\"40\" height=\"40\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" style=\"margin-bottom:14px;color:var(--ink,#00004F);\"><path d=\"M12 3v12m0-12l-4 4m4-4l4 4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2\"><\u002Fpath><\u002Fsvg>\n      <h3 style=\"margin:0 0 6px;font-size:18px;font-weight:700;\">Arrastra tu archivo .xlsx aquí<\u002Fh3>\n      <p style=\"margin:0;color:var(--faint,#8C93A4);font-size:13px;\">o haz clic para seleccionarlo desde tu equipo<\u002Fp>\n    <\u002Fdiv>\n    <sc-if value=\"{{ hasError }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"color:var(--accent2,#ED7D31);font-size:13px;margin-top:14px;font-weight:600;\">{{ fileError }}<\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:36px;\">\n      <div style=\"background:var(--paper,#fff);border:1px solid var(--line,#CBD3E0);border-radius:10px;padding:16px;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--faint,#8C93A4);display:block;margin-bottom:8px;\">01<\u002Fspan><b style=\"display:block;font-size:14px;margin-bottom:4px;\">Impresiones<\u002Fb><span style=\"font-size:12.5px;color:var(--muted,#5B6478);line-height:1.4;\">Total de impresiones servidas en toda la campaña.<\u002Fspan><\u002Fdiv>\n      <div style=\"background:var(--paper,#fff);border:1px solid var(--line,#CBD3E0);border-radius:10px;padding:16px;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--faint,#8C93A4);display:block;margin-bottom:8px;\">02<\u002Fspan><b style=\"display:block;font-size:14px;margin-bottom:4px;\">Pantallas<\u002Fb><span style=\"font-size:12.5px;color:var(--muted,#5B6478);line-height:1.4;\">Sites únicos en los que se ha emitido el creativo.<\u002Fspan><\u002Fdiv>\n      <div style=\"background:var(--paper,#fff);border:1px solid var(--line,#CBD3E0);border-radius:10px;padding:16px;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--faint,#8C93A4);display:block;margin-bottom:8px;\">03<\u002Fspan><b style=\"display:block;font-size:14px;margin-bottom:4px;\">Playouts<\u002Fb><span style=\"font-size:12.5px;color:var(--muted,#5B6478);line-height:1.4;\">Reproducciones del anuncio (ad plays).<\u002Fspan><\u002Fdiv>\n      <div style=\"background:var(--paper,#fff);border:1px solid var(--line,#CBD3E0);border-radius:10px;padding:16px;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--faint,#8C93A4);display:block;margin-bottom:8px;\">04<\u002Fspan><b style=\"display:block;font-size:14px;margin-bottom:4px;\">Inventario editable<\u002Fb><span style=\"font-size:12.5px;color:var(--muted,#5B6478);line-height:1.4;\">Tú clasificas cada ad group en su tipo de inventario.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <\u002Fsc-if>\n\n  <!-- ============ DASHBOARD ============ -->\n  <sc-if value=\"{{ isDashboard }}\" hint-placeholder-val=\"{{ false }}\">\n  <section style=\"max-width:1280px;margin:0 auto;padding:24px 24px 80px;\">\n\n    <!-- campaign selector -->\n    <div style=\"background:var(--paper,#fff);border:1px solid var(--line,#CBD3E0);border-radius:14px;padding:16px 20px;margin-bottom:20px;box-shadow:0 8px 24px -14px rgba(15,27,51,.18);\">\n      <div style=\"font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint,#8C93A4);font-weight:700;margin-bottom:12px;\">Campañas incluidas<\u002Fdiv>\n      <div style=\"display:flex;flex-wrap:wrap;gap:10px;\">\n        <sc-for list=\"{{ campaignChips }}\" as=\"chip\" hint-placeholder-count=\"2\">\n          <button onclick=\"{{ chip.onToggle }}\" title=\"{{ chip.title }}\" style=\"{{ chip.style }}\">\n            <span style=\"{{ chip.dotStyle }}\"><\u002Fspan>{{ chip.label }}\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ noSelection }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:var(--accent-soft,#E4EAF9);border:1px solid var(--accent,#4472C4);color:var(--ink,#00004F);padding:14px 18px;border-radius:12px;font-size:13px;\">Selecciona al menos una campaña para ver el panel.<\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ hasSelection }}\" hint-placeholder-val=\"{{ true }}\">\n    <div>\n      <!-- DOOH KPIs -->\n      <div style=\"display:flex;align-items:center;gap:8px;margin:0 2px 10px;\">\n        <span style=\"width:8px;height:8px;border-radius:2px;background:var(--accent,#4472C4);\"><\u002Fspan>\n        <span style=\"font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint,#8C93A4);font-weight:700;\">Métricas DOOH<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px;\">\n        <div style=\"background:var(--paper,#fff);border:1px solid var(--line,#CBD3E0);border-radius:14px;padding:18px 22px;box-shadow:0 8px 24px -14px rgba(15,27,51,.18);position:relative;overflow:hidden;\">\n          <div style=\"font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint,#8C93A4);font-weight:700;margin-bottom:10px;\">Impresiones<\u002Fdiv>\n          <div style=\"font-family:'Schibsted Grotesk',sans-serif;font-weight:700;font-size:38px;line-height:1;color:var(--accent,#4472C4);\">{{ kpiImpr }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:var(--paper,#fff);border:1px solid var(--line,#CBD3E0);border-radius:14px;padding:18px 22px;box-shadow:0 8px 24px -14px rgba(15,27,51,.18);\">\n          <div style=\"font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint,#8C93A4);font-weight:700;margin-bottom:10px;\">Pantallas<\u002Fdiv>\n          <div style=\"font-family:'Schibsted Grotesk',sans-serif;font-weight:700;font-size:38px;line-height:1;\">{{ kpiPant }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:var(--paper,#fff);border:1px solid var(--line,#CBD3E0);border-radius:14px;padding:18px 22px;box-shadow:0 8px 24px -14px rgba(15,27,51,.18);\">\n          <div style=\"font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint,#8C93A4);font-weight:700;margin-bottom:10px;\">Playouts<\u002Fdiv>\n          <div style=\"font-family:'Schibsted Grotesk',sans-serif;font-weight:700;font-size:38px;line-height:1;\">{{ kpiPlays }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Retargeting / Display KPIs -->\n      <sc-if value=\"{{ hasRtg }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"margin-bottom:22px;\">\n        <div style=\"display:flex;align-items:center;gap:8px;margin:0 2px 10px;\">\n          <span style=\"width:8px;height:8px;border-radius:2px;background:#7A5AF8;\"><\u002Fspan>\n          <span style=\"font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint,#8C93A4);font-weight:700;\">Métricas Retargeting / Display<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:14px;\">\n          <div style=\"background:var(--paper,#fff);border:1px solid var(--line,#CBD3E0);border-radius:14px;padding:18px 22px;box-shadow:0 8px 24px -14px rgba(15,27,51,.18);\">\n            <div style=\"font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint,#8C93A4);font-weight:700;margin-bottom:10px;\">Impresiones<\u002Fdiv>\n            <div style=\"font-family:'Schibsted Grotesk',sans-serif;font-weight:700;font-size:38px;line-height:1;color:#7A5AF8;\">{{ kpiRtgImpr }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:var(--paper,#fff);border:1px solid var(--line,#CBD3E0);border-radius:14px;padding:18px 22px;box-shadow:0 8px 24px -14px rgba(15,27,51,.18);\">\n            <div style=\"font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint,#8C93A4);font-weight:700;margin-bottom:10px;\">Clicks<\u002Fdiv>\n            <div style=\"font-family:'Schibsted Grotesk',sans-serif;font-weight:700;font-size:38px;line-height:1;\">{{ kpiRtgClicks }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:var(--paper,#fff);border:1px solid var(--line,#CBD3E0);border-radius:14px;padding:18px 22px;box-shadow:0 8px 24px -14px rgba(15,27,51,.18);\">\n            <div style=\"font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint,#8C93A4);font-weight:700;margin-bottom:10px;\">CTR<\u002Fdiv>\n            <div style=\"font-family:'Schibsted Grotesk',sans-serif;font-weight:700;font-size:38px;line-height:1;\">{{ kpiRtgCtr }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- Inventory split -->\n      <div style=\"background:var(--paper,#fff);border:1px solid var(--line,#CBD3E0);border-radius:14px;padding:20px 22px 18px;box-shadow:0 8px 24px -14px rgba(15,27,51,.18);margin-bottom:16px;\">\n        <h4 style=\"margin:0 0 2px;font-size:14px;font-weight:700;\">Delivery por tipo de inventario<\u002Fh4>\n        <div style=\"font-size:11.5px;color:var(--faint,#8C93A4);margin-bottom:16px;font-family:'IBM Plex Mono',monospace;\">% DE IMPRESIONES DOOH POR INVENTARIO · EXCLUYE RETARGETING<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;\">\n          <sc-for list=\"{{ invSplit }}\" as=\"inv\" hint-placeholder-count=\"5\">\n            <div style=\"border:1px solid var(--line,#CBD3E0);border-radius:12px;padding:14px 16px;display:flex;flex-direction:column;gap:10px;background:var(--bg,#EDF0F5);\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;\">\n                <span style=\"display:inline-flex;width:34px;height:34px;align-items:center;justify-content:center;border-radius:9px;color:#fff;background:{{ inv.color }};\">{{ inv.icon }}<\u002Fspan>\n                <span style=\"font-family:'Schibsted Grotesk',sans-serif;font-weight:700;font-size:26px;line-height:1;color:{{ inv.color }};\">{{ inv.pct }}<\u002Fspan>\n              <\u002Fdiv>\n              <div>\n                <div style=\"font-size:12.5px;font-weight:600;\">{{ inv.type }}<\u002Fdiv>\n                <div style=\"font-size:11px;color:var(--faint,#8C93A4);font-family:'IBM Plex Mono',monospace;\">{{ inv.valueFmt }} impr.<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"height:6px;border-radius:4px;background:var(--paper-alt,#E3E8F0);overflow:hidden;\"><div style=\"height:100%;border-radius:4px;background:{{ inv.color }};width:{{ inv.barWidth }};\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Hour + Day charts -->\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;\" ref=\"{{ chartGridRef }}\">\n        <div style=\"background:var(--paper,#fff);border:1px solid var(--line,#CBD3E0);border-radius:14px;padding:20px 22px 16px;box-shadow:0 8px 24px -14px rgba(15,27,51,.18);\">\n          <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:14px;\">\n            <div>\n              <h4 style=\"margin:0 0 2px;font-size:14px;font-weight:700;\">Impresiones por inventario y hora<\u002Fh4>\n              <div style=\"font-size:11.5px;color:var(--faint,#8C93A4);font-family:'IBM Plex Mono',monospace;\">FRANJA HORARIA (0–23H)<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:inline-flex;gap:3px;padding:3px;background:var(--bg,#EDF0F5);border:1px solid var(--line,#CBD3E0);border-radius:9px;flex:none;\">\n              <button onclick=\"{{ onHourInv }}\" style=\"{{ hourSegInvStyle }}\">Por inventario<\u002Fbutton>\n              <button onclick=\"{{ onHourTotal }}\" style=\"{{ hourSegTotalStyle }}\">Total<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"position:relative;height:300px;\"><canvas ref=\"{{ hourCanvas }}\"><\u002Fcanvas><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:var(--paper,#fff);border:1px solid var(--line,#CBD3E0);border-radius:14px;padding:20px 22px 16px;box-shadow:0 8px 24px -14px rgba(15,27,51,.18);\">\n          <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:14px;\">\n            <div>\n              <h4 style=\"margin:0 0 2px;font-size:14px;font-weight:700;\">Impresiones por día de la semana<\u002Fh4>\n              <div style=\"font-size:11.5px;color:var(--faint,#8C93A4);font-family:'IBM Plex Mono',monospace;\">LUNES → DOMINGO<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:inline-flex;gap:3px;padding:3px;background:var(--bg,#EDF0F5);border:1px solid var(--line,#CBD3E0);border-radius:9px;flex:none;\">\n              <button onclick=\"{{ onDayInv }}\" style=\"{{ daySegInvStyle }}\">Por inventario<\u002Fbutton>\n              <button onclick=\"{{ onDayTotal }}\" style=\"{{ daySegTotalStyle }}\">Total<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"position:relative;height:300px;\"><canvas ref=\"{{ dayCanvas }}\"><\u002Fcanvas><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Line chart -->\n      <div style=\"background:var(--paper,#fff);border:1px solid var(--line,#CBD3E0);border-radius:14px;padding:20px 22px 16px;box-shadow:0 8px 24px -14px rgba(15,27,51,.18);margin-bottom:16px;\">\n        <h4 style=\"margin:0 0 2px;font-size:14px;font-weight:700;\">Evolución diaria por canal<\u002Fh4>\n        <div style=\"font-size:11.5px;color:var(--faint,#8C93A4);margin-bottom:14px;font-family:'IBM Plex Mono',monospace;\">IMPRESIONES POR DÍA · SEGÚN CLASIFICACIÓN (VER PANEL INFERIOR)<\u002Fdiv>\n        <div style=\"position:relative;height:320px;\"><canvas ref=\"{{ lineCanvas }}\"><\u002Fcanvas><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Inventory classification -->\n      <div style=\"background:var(--paper,#fff);border:1px solid var(--line,#CBD3E0);border-radius:14px;padding:20px 22px 18px;box-shadow:0 8px 24px -14px rgba(15,27,51,.18);\">\n        <h4 style=\"margin:0 0 2px;font-size:14px;font-weight:700;\">Clasificación de inventario<\u002Fh4>\n        <div style=\"font-size:11.5px;color:var(--faint,#8C93A4);margin-bottom:16px;font-family:'IBM Plex Mono',monospace;\">CLASIFICA CADA AD GROUP Y ELIGE CÓMO SE REPORTA EN LA EVOLUCIÓN DIARIA · SE GUARDA AUTOMÁTICAMENTE<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:14px 1fr 180px 200px 96px;gap:12px;padding:0 10px 6px;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint,#8C93A4);font-weight:700;\">\n          <span><\u002Fspan><span>Ad group<\u002Fspan><span>Tipo de inventario<\u002Fspan><span>En evolución diaria<\u002Fspan><span style=\"text-align:right;\">Impresiones<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:8px;\">\n          <sc-for list=\"{{ adgroupRows }}\" as=\"row\" hint-placeholder-count=\"6\">\n            <div style=\"display:grid;grid-template-columns:14px 1fr 180px 200px 96px;align-items:center;gap:12px;padding:8px 10px;border:1px solid var(--line,#CBD3E0);border-radius:10px;\">\n              <span style=\"width:12px;height:12px;border-radius:3px;background:{{ row.color }};\"><\u002Fspan>\n              <div style=\"min-width:0;\">\n                <div style=\"font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\" title=\"{{ row.name }}\">{{ row.short }}<\u002Fdiv>\n                <div style=\"font-size:10.5px;color:var(--faint,#8C93A4);font-family:'IBM Plex Mono',monospace;\">{{ row.campaignShort }}<\u002Fdiv>\n              <\u002Fdiv>\n              <select value=\"{{ row.inv }}\" onchange=\"{{ row.onChange }}\" style=\"appearance:none;border:1.5px solid var(--line-strong,#00004F);border-radius:8px;background:var(--paper,#fff);padding:8px 12px;font-size:13px;font-family:'Schibsted Grotesk',sans-serif;font-weight:500;color:var(--ink,#00004F);cursor:pointer;\">{{ invOptionEls }}<\u002Fselect>\n              <div>\n                <sc-if value=\"{{ row.isDoohRow }}\" hint-placeholder-val=\"{{ true }}\">\n                  <select value=\"{{ row.evol }}\" onchange=\"{{ row.onEvolChange }}\" style=\"width:100%;appearance:none;border:1.5px solid var(--line,#CBD3E0);border-radius:8px;background:var(--paper,#fff);padding:8px 12px;font-size:12.5px;font-family:'Schibsted Grotesk',sans-serif;font-weight:500;color:var(--ink,#00004F);cursor:pointer;\">{{ evolOptionEls }}<\u002Fselect>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ row.isRtg }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"font-size:11.5px;color:var(--faint,#8C93A4);font-family:'IBM Plex Mono',monospace;padding:8px 2px;\">Línea propia<\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;text-align:right;color:var(--muted,#5B6478);\">{{ row.impressionsFmt }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fsection>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:800},&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;editorial&quot;,&quot;dooh&quot;,&quot;dark&quot;],&quot;default&quot;:&quot;editorial&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Estilo&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.state = { view:'upload', data:null, selected:[], invMap:{}, evolMap:{}, error:'', drag:false, invVer:0, hourMode:'inv', dayMode:'inv' };\n    this.rootRef = React.createRef();\n    this.chartGridRef = React.createRef();\n    this.hourCanvas = React.createRef();\n    this.dayCanvas = React.createRef();\n    this.lineCanvas = React.createRef();\n    this._fileInput = null;\n    this._charts = {};\n    this._chartSig = '';\n    this._themeSig = '';\n  }\n\n  // ---------- constants ----------\n  get INV_TYPES(){ return ['Mobiliario Urbano','C. Comerciales','Universidades','Transportes','Ocio / Bares','Aeropuertos','Retargeting Display','Otros']; }\n  invColor(t){\n    return ({\n      'Mobiliario Urbano':'#1E7F44','C. Comerciales':'#1F4E79','Universidades':'#2FA8E0',\n      'Transportes':'#ED7D31','Ocio / Bares':'#B4408F','Aeropuertos':'#6B8E23',\n      'Retargeting Display':'#7A5AF8','Otros':'#8C93A4'\n    })[t] || '#8C93A4';\n  }\n  get THEMES(){\n    return {\n      editorial:{ '--bg':'#EDF0F5','--paper':'#FFFFFF','--paper-alt':'#E3E8F0','--ink':'#00004F','--muted':'#5B6478','--faint':'#8C93A4','--line':'#CBD3E0','--line-strong':'#00004F','--accent':'#4472C4','--accent2':'#ED7D31','--accent-soft':'#E4EAF9' },\n      dooh:{ '--bg':'#A6E4EC','--paper':'#F3FBEF','--paper-alt':'#D7EEC4','--ink':'#0B1F5B','--muted':'#3C5578','--faint':'#5E7B93','--line':'#B7D9CB','--line-strong':'#0B1F5B','--accent':'#3B4CF0','--accent2':'#1E7F44','--accent-soft':'#CDEBB0' },\n      dark:{ '--bg':'#0E1116','--paper':'#171B22','--paper-alt':'#232A34','--ink':'#E8ECF1','--muted':'#A4AEBD','--faint':'#6E7889','--line':'#2A313C','--line-strong':'#3A4552','--accent':'#5B9BFF','--accent2':'#FF8A4C','--accent-soft':'#1B2740' }\n    };\n  }\n  themeKey(){ const k = this.props.theme || 'editorial'; return this.THEMES[k] ? k : 'editorial'; }\n\n  norm(s){ return String(s||'').normalize('NFD').replace(/[\\u0300-\\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]/g,''); }\n\n  guessInv(adgroup, campaign){\n    const s = this.norm(adgroup+' '+campaign);\n    if(s.includes('aeropuerto')||s.includes('airport')) return 'Aeropuertos';\n    if(s.includes('rtg')||s.includes('display')||s.includes('retarget')) return 'Retargeting Display';\n    if(s.includes('malls')||s.includes('comercial')) return 'C. Comerciales';\n    if(s.includes('universi')||s.includes('mupiuni')) return 'Universidades';\n    if(s.includes('metro')||s.includes('transport')||s.includes('tren')) return 'Transportes';\n    if(s.includes('ocio')||s.includes('bar')) return 'Ocio / Bares';\n    return 'Mobiliario Urbano';\n  }\n\n  // ---------- lifecycle ----------\n  componentDidMount(){ this.applyTheme(); }\n  componentDidUpdate(){ this.applyTheme(); this.syncCharts(); }\n\n  applyTheme(){\n    const el = this.rootRef.current; if(!el) return;\n    const sig = this.themeKey();\n    if(sig === this._themeSig) return;\n    this._themeSig = sig;\n    const vars = this.THEMES[sig];\n    for(const k in vars) el.style.setProperty(k, vars[k]);\n    this._chartSig = ''; // force chart recolor\n    this.syncCharts();\n  }\n\n  // ---------- file handling ----------\n  ensureInput(){\n    if(this._fileInput) return this._fileInput;\n    const inp = document.createElement('input');\n    inp.type='file'; inp.accept='.xlsx,.xls'; inp.style.display='none';\n    inp.addEventListener('change', e=>{ if(e.target.files[0]) this.handleFile(e.target.files[0]); });\n    document.body.appendChild(inp);\n    this._fileInput = inp; return inp;\n  }\n  onPickFile = ()=> this.ensureInput().click();\n  onDragOver = (e)=>{ e.preventDefault(); if(!this.state.drag) this.setState({drag:true}); };\n  onDragLeave = (e)=>{ e.preventDefault(); this.setState({drag:false}); };\n  onDrop = (e)=>{ e.preventDefault(); this.setState({drag:false}); const f=e.dataTransfer.files[0]; if(f) this.handleFile(f); };\n\n  handleFile(file){\n    this.setState({error:''});\n    if(typeof XLSX==='undefined'){ this.setState({error:'No se pudo cargar la librería de lectura de Excel. Revisa tu conexión y recarga.'}); return; }\n    if(typeof Chart==='undefined'){ this.setState({error:'No se pudo cargar la librería de gráficos. Revisa tu conexión y recarga.'}); return; }\n    const reader = new FileReader();\n    reader.onload = (e)=>{\n      try{\n        const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});\n        const data = this.parseWorkbook(wb);\n        if(!data.adgroups.length) throw new Error('No se han encontrado ad groups reconocibles.');\n        const invMap = this.loadInvMap(data);\n        const evolMap = this.loadEvolMap(data);\n        this.setState({ data, invMap, evolMap, selected:[...data.campaigns], view:'dashboard', error:'' });\n      }catch(err){ this.setState({error:'No se pudo leer el archivo: '+err.message}); }\n    };\n    reader.onerror = ()=> this.setState({error:'Error al leer el archivo.'});\n    reader.readAsArrayBuffer(file);\n  }\n\n  onReset = ()=>{ this.destroyCharts(); this.setState({view:'upload', data:null, selected:[], error:''}); };\n\n  // ---------- parsing ----------\n  rows(ws){ return XLSX.utils.sheet_to_json(ws, {defval:null, raw:true}); }\n  findCol(headers, subs){ return headers.find(h => subs.every(k => this.norm(h).includes(k))) || null; }\n\n  parseWorkbook(wb){\n    const daily=[], dayhour=[], site=[];\n    const campSet=new Set(), agCampaign=new Map();\n    for(const name of wb.SheetNames){\n      const rws = this.rows(wb.Sheets[name]);\n      if(!rws.length) continue;\n      const H = Object.keys(rws[0]);\n      const cAg = this.findCol(H,['ad','group']) || this.findCol(H,['grupo']);\n      const cSite = this.findCol(H,['site']);\n      const cHour = this.findCol(H,['hour']) || this.findCol(H,['hora']);\n      const cDay  = this.findCol(H,['day','week']) || this.findCol(H,['dia','semana']) || this.findCol(H,['weekday'])\n                    || H.find(h=> h!==cHour && (this.norm(h).includes('day')||this.norm(h).includes('dia')) && !this.norm(h).includes('hour') && !this.norm(h).includes('hora'));\n      const cDate = this.findCol(H,['date']) || this.findCol(H,['fecha']);\n      const cCamp = this.findCol(H,['campaign']) || this.findCol(H,['campa']);\n      const cImp  = this.findCol(H,['impres']);\n      const cPlay = this.findCol(H,['play']);\n      const cClick = this.findCol(H,['click']);\n      if(!cImp) continue;\n      if(cSite && cAg){\n        rws.forEach(r=> site.push({ adgroup:r[cAg], site:r[cSite], impressions:+r[cImp]||0, plays:+((cPlay?r[cPlay]:0))||0 }));\n      } else if(cHour && cCamp){\n        rws.forEach(r=>{ const c=r[cCamp]; if(!c) return; campSet.add(c); if(cAg&&!agCampaign.has(r[cAg])) agCampaign.set(r[cAg],c);\n          dayhour.push({ campaign:c, adgroup:r[cAg], hour:(r[cHour]==null?null:+r[cHour]), day:cDay?r[cDay]:null, impressions:+r[cImp]||0, plays:+((cPlay?r[cPlay]:0))||0 }); });\n      } else if(cDate && cCamp){\n        rws.forEach(r=>{ const c=r[cCamp]; if(!c) return; campSet.add(c); if(cAg&&!agCampaign.has(r[cAg])) agCampaign.set(r[cAg],c);\n          daily.push({ campaign:c, adgroup:r[cAg], date:r[cDate], impressions:+r[cImp]||0, plays:+((cPlay?r[cPlay]:0))||0, clicks:+((cClick?r[cClick]:0))||0 }); });\n      }\n    }\n    const campaigns = Array.from(campSet).sort((a,b)=>String(a).localeCompare(String(b)));\n    const agSet = new Set(); daily.forEach(r=>agSet.add(r.adgroup)); dayhour.forEach(r=>agSet.add(r.adgroup));\n    const adgroups = Array.from(agSet).filter(Boolean).map(name=>({ name, campaign: agCampaign.get(name)||'' }));\n    return { daily, dayhour, site, campaigns, adgroups, agCampaign };\n  }\n\n  // ---------- inventory map persistence ----------\n  loadInvMap(data){\n    let stored={}; try{ stored = JSON.parse(localStorage.getItem('dooh-invmap-v1')||'{}'); }catch(e){}\n    const map={};\n    data.adgroups.forEach(a=>{ map[a.name] = stored[a.name] || this.guessInv(a.name, a.campaign); });\n    return map;\n  }\n  saveInvMap(map){ try{ localStorage.setItem('dooh-invmap-v1', JSON.stringify(map)); }catch(e){} }\n  // evolution reporting mode per ad group: 'dooh' (agrupado) | 'inventory'\n  loadEvolMap(data){\n    let stored={}; try{ stored = JSON.parse(localStorage.getItem('dooh-evolmap-v1')||'{}'); }catch(e){}\n    const map={}; data.adgroups.forEach(a=>{ map[a.name] = stored[a.name] || 'dooh'; });\n    return map;\n  }\n  evolOf(adgroup){ return this.state.evolMap[adgroup] || 'dooh'; }\n  setEvol(adgroup, mode){\n    const evolMap = {...this.state.evolMap, [adgroup]:mode};\n    try{ localStorage.setItem('dooh-evolmap-v1', JSON.stringify(evolMap)); }catch(e){}\n    this.setState({ evolMap, invVer:this.state.invVer+1 });\n  }\n\n  setInv(adgroup, type){\n    const invMap = {...this.state.invMap, [adgroup]:type};\n    this.saveInvMap(invMap);\n    this.setState({ invMap, invVer:this.state.invVer+1 });\n  }\n\n  toggleCampaign(name){\n    const sel = this.state.selected.includes(name) ? this.state.selected.filter(c=>c!==name) : [...this.state.selected, name];\n    this.setState({selected:sel});\n  }\n\n  // ---------- helpers ----------\n  segStyle(active){ return 'padding:5px 11px;border:none;border-radius:7px;font-size:11.5px;font-weight:600;cursor:pointer;font-family:Schibsted Grotesk,sans-serif;white-space:nowrap;background:'+(active?'var(--paper,#fff)':'transparent')+';color:'+(active?'var(--ink,#00004F)':'var(--faint,#8C93A4)')+';box-shadow:'+(active?'0 1px 2px rgba(0,0,0,.15)':'none')+';'; }\n  fmt(n){ return String(Math.round(n)).replace(/\\B(?=(\\d{3})+(?!\\d))/g,'.'); }\n  invOf(adgroup){ return this.state.invMap[adgroup] || 'Otros'; }\n  serialToDate(s){ if(typeof s!=='number') return null; return new Date(Math.round((s-25569)*86400000)); }\n  shortAg(name){ return String(name).replace(/^INS_[^_]*_[^_]*_/i,'').replace(/_/g,' '); }\n  shortCamp(name){ const s=String(name).replace(/^INS_[^_]*_[^_]*_/i,'').replace(/_/g,' '); return s; }\n\n  // ---------- charts ----------\n  chartTextColor(){ const el=this.rootRef.current; return el? getComputedStyle(el).getPropertyValue('--muted').trim()||'#5B6478' : '#5B6478'; }\n  chartGridColor(){ const el=this.rootRef.current; return el? getComputedStyle(el).getPropertyValue('--line').trim()||'#CBD3E0' : '#CBD3E0'; }\n  chartInkColor(){ const el=this.rootRef.current; return el? getComputedStyle(el).getPropertyValue('--ink').trim()||'#00004F' : '#00004F'; }\n\n  destroyCharts(){ Object.values(this._charts).forEach(c=>{ try{c.destroy();}catch(e){} }); this._charts={}; }\n\n  syncCharts(){\n    if(this.state.view!=='dashboard' || !this.state.data || !this.state.selected.length) return;\n    if(!this.hourCanvas.current || !this.dayCanvas.current || !this.lineCanvas.current) return;\n    const sig = JSON.stringify(this.state.selected)+'|'+this.state.invVer+'|'+this._themeSig+'|'+this.state.hourMode+this.state.dayMode;\n    if(sig===this._chartSig) return;\n    this._chartSig = sig;\n    this.destroyCharts();\n    this.buildHourChart();\n    this.buildDayChart();\n    this.buildLineChart();\n  }\n\n  selectedInvTypes(rowsList){\n    // inventory types present in given rows, ordered by INV_TYPES\n    const present = new Set();\n    rowsList.forEach(r=> present.add(this.invOf(r.adgroup)));\n    return this.INV_TYPES.filter(t=>present.has(t));\n  }\n\n  buildHourChart(){\n    const D=this.state.data, sel=this.state.selected;\n    const rows = D.dayhour.filter(r=> sel.includes(r.campaign) && r.hour!=null && r.impressions>0);\n    const hours = Array.from(new Set(rows.map(r=>r.hour))).sort((a,b)=>a-b);\n    let datasets;\n    if(this.state.hourMode==='total'){\n      const per = hours.map(h=> rows.filter(r=>r.hour===h).reduce((a,r)=>a+r.impressions,0));\n      datasets = [{ label:'Total impresiones', data:per, backgroundColor:'#2D6CDF', borderRadius:2, barPercentage:0.7, categoryPercentage:0.8 }];\n    } else {\n      const types = this.selectedInvTypes(rows);\n      datasets = types.map(t=>{\n        const per = hours.map(h=> rows.filter(r=>r.hour===h && this.invOf(r.adgroup)===t).reduce((a,r)=>a+r.impressions,0));\n        return { label:t, data:per, backgroundColor:this.invColor(t), borderRadius:2, barPercentage:0.9, categoryPercentage:0.8 };\n      });\n    }\n    this._charts.hour = new Chart(this.hourCanvas.current, {\n      type:'bar',\n      data:{ labels:hours.map(h=>h+'h'), datasets },\n      options:this.barOpts()\n    });\n  }\n\n  buildDayChart(){\n    const D=this.state.data, sel=this.state.selected;\n    const order=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];\n    const es={Monday:'Lun',Tuesday:'Mar',Wednesday:'Mié',Thursday:'Jue',Friday:'Vie',Saturday:'Sáb',Sunday:'Dom'};\n    const rows = D.dayhour.filter(r=> sel.includes(r.campaign) && r.day && order.includes(r.day) && r.impressions>0);\n    let datasets;\n    if(this.state.dayMode==='total'){\n      const per = order.map(d=> rows.filter(r=>r.day===d).reduce((a,r)=>a+r.impressions,0));\n      datasets = [{ label:'Total impresiones', data:per, backgroundColor:'#2D6CDF', borderRadius:2, barPercentage:0.6, categoryPercentage:0.78 }];\n    } else {\n      const types = this.selectedInvTypes(rows);\n      datasets = types.map(t=>{\n        const per = order.map(d=> rows.filter(r=>r.day===d && this.invOf(r.adgroup)===t).reduce((a,r)=>a+r.impressions,0));\n        return { label:t, data:per, backgroundColor:this.invColor(t), borderRadius:2, barPercentage:0.9, categoryPercentage:0.78 };\n      });\n    }\n    this._charts.day = new Chart(this.dayCanvas.current, {\n      type:'bar',\n      data:{ labels:order.map(d=>es[d]), datasets },\n      options:this.barOpts()\n    });\n  }\n\n  buildLineChart(){\n    const D=this.state.data, sel=this.state.selected;\n    const palette=['#E85D9E','#1E7F44','#4472C4','#F2A626','#7A5AF8','#00A6A6'];\n    const MONTHS=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];\n    const rows = D.daily.filter(r=> sel.includes(r.campaign));\n    const serials = rows.map(r=>r.date).filter(s=>typeof s==='number');\n    let dates=[];\n    if(serials.length){ const mn=Math.min(...serials), mx=Math.max(...serials); for(let s=mn;s<=mx;s++) dates.push(s); }\n    const labels = dates.map(s=>{ const d=this.serialToDate(s); return d? String(d.getUTCDate()).padStart(2,'0')+' '+MONTHS[d.getUTCMonth()] : String(s); });\n    // Agrupación de líneas: por ad group -> 'DOOH' agrupado, su tipo de inventario, o 'Retargeting Display'\n    const groupKey = (ag)=> !this.isDooh(ag) ? 'Retargeting Display' : (this.evolOf(ag)==='inventory' ? this.invOf(ag) : 'DOOH');\n    const order = ['DOOH', ...this.INV_TYPES.filter(t=>t!=='Retargeting Display'), 'Retargeting Display'];\n    const present = [];\n    rows.forEach(r=>{ const k=groupKey(r.adgroup); if(!present.includes(k)) present.push(k); });\n    present.sort((a,b)=> order.indexOf(a)-order.indexOf(b));\n    const dateIdx = new Map(dates.map((s,i)=>[s,i]));\n    const colorFor = (k)=> k==='DOOH' ? '#2D6CDF' : this.invColor(k);\n    const datasets = present.map(k=>{\n      const arr = new Array(dates.length).fill(0);\n      rows.forEach(r=>{ if(groupKey(r.adgroup)===k && typeof r.date==='number'){ const i=dateIdx.get(r.date); if(i!=null) arr[i]+=r.impressions; } });\n      const col = colorFor(k);\n      return { label:k, data:arr, borderColor:col, backgroundColor:col+'22', tension:.3, pointRadius:0, pointHoverRadius:4, borderWidth:2.5, fill:false };\n    });\n    this._charts.line = new Chart(this.lineCanvas.current, {\n      type:'line',\n      data:{ labels, datasets },\n      options:{\n        responsive:true, maintainAspectRatio:false, interaction:{mode:'index',intersect:false},\n        plugins:{ legend:{position:'top',align:'end',labels:{boxWidth:10,boxHeight:10,usePointStyle:true,color:this.chartInkColor(),font:{family:'Schibsted Grotesk',size:12}}},\n          tooltip:{backgroundColor:'#00004F',titleFont:{family:'IBM Plex Mono'},callbacks:{label:c=>c.dataset.label+': '+this.fmt(c.parsed.y)}} },\n        scales:{ x:{grid:{display:false},border:{display:false},ticks:{color:this.chartTextColor(),maxRotation:60,minRotation:60,font:{family:'IBM Plex Mono',size:10}}},\n          y:{min:0,grid:{display:false},border:{display:false},ticks:{color:this.chartTextColor(),font:{family:'IBM Plex Mono',size:11},callback:v=>this.fmt(v)}} }\n      }\n    });\n  }\n\n  barOpts(){\n    return {\n      responsive:true, maintainAspectRatio:false, interaction:{mode:'index',intersect:false},\n      plugins:{ legend:{position:'bottom',labels:{boxWidth:10,boxHeight:10,usePointStyle:true,color:this.chartInkColor(),font:{family:'Schibsted Grotesk',size:11}}},\n        tooltip:{backgroundColor:'#00004F',titleFont:{family:'IBM Plex Mono'},callbacks:{label:c=>c.dataset.label+': '+this.fmt(c.parsed.y)}} },\n      scales:{ x:{grid:{display:false},border:{display:false},ticks:{color:this.chartTextColor(),font:{family:'IBM Plex Mono',size:10}}},\n        y:{min:0,grid:{display:false},border:{display:false},ticks:{color:this.chartTextColor(),font:{family:'IBM Plex Mono',size:10},callback:v=>v>=1000?(v/1000)+'k':v}} }\n    };\n  }\n\n  // ---------- icons ----------\n  icon(type){\n    const c=React.createElement, p=(d,extra)=>c('path',Object.assign({d,fill:'none',stroke:'currentColor','strokeWidth':1.7,strokeLinecap:'round',strokeLinejoin:'round'},extra||{}));\n    const svg=(...kids)=>c('svg',{width:18,height:18,viewBox:'0 0 24 24'},...kids);\n    switch(type){\n      case 'Mobiliario Urbano': return svg(p('M4 21V8l5-3v16M9 21V3l7 3v15M16 21V9l4 2v10M2 21h20'));\n      case 'C. Comerciales': return svg(p('M4 9l1.5-4h13L20 9M4 9h16v11a1 1 0 01-1 1H5a1 1 0 01-1-1V9zM9 21v-6h6v6'));\n      case 'Universidades': return svg(p('M12 4L2 9l10 5 10-5-10-5zM6 11v5c0 1 2.7 2.5 6 2.5s6-1.5 6-2.5v-5'));\n      case 'Transportes': return svg(p('M6 4h12a2 2 0 012 2v9a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2zM4 11h16M8 21l1.5-3M16 21l-1.5-3'),c('circle',{cx:8.5,cy:14,r:1,fill:'currentColor'}),c('circle',{cx:15.5,cy:14,r:1,fill:'currentColor'}));\n      case 'Ocio / Bares': return svg(p('M7 8h10l-1 12a1 1 0 01-1 1H9a1 1 0 01-1-1L7 8zM7 8l-1-4M14 4h4'));\n      case 'Aeropuertos': return svg(p('M21 15l-8-3V5a1.5 1.5 0 00-3 0v7l-7 3v2l7-2v3l-2 1.5V21l3-1 3 1v-1.5L12 18v-3l9 2z'));\n      case 'Retargeting Display': return svg(p('M3 4h18v12H3zM8 20h8M12 16v4'),c('circle',{cx:12,cy:10,r:3,fill:'none',stroke:'currentColor',strokeWidth:1.7}));\n      default: return svg(p('M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 13h7v7h-7z'));\n    }\n  }\n\n  // ---------- render ----------\n  computeInvSplit(){\n    const D=this.state.data, sel=this.state.selected;\n    if(!D) return {list:[], total:0};\n    // Solo inventario DOOH (el retargeting/display se excluye de este reparto)\n    const rows = (D.daily.length ? D.daily : D.dayhour).filter(r=>sel.includes(r.campaign) && this.isDooh(r.adgroup));\n    const agg = new Map();\n    rows.forEach(r=>{ const t=this.invOf(r.adgroup); agg.set(t,(agg.get(t)||0)+r.impressions); });\n    const total = Array.from(agg.values()).reduce((a,b)=>a+b,0)||1;\n    const list = this.INV_TYPES.filter(t=>agg.has(t)&&agg.get(t)>0).map(t=>({ type:t, value:agg.get(t) }))\n      .sort((a,b)=>b.value-a.value);\n    const max = list.length? list[0].value:1;\n    return { list: list.map(o=>({\n      type:o.type, color:this.invColor(o.type),\n      pct: (o.value/total*100).toFixed(0)+'%',\n      valueFmt: this.fmt(o.value),\n      barWidth: (o.value/max*100).toFixed(0)+'%',\n      icon: this.icon(o.type)\n    })), total };\n  }\n\n  isDooh(adgroup){ return this.invOf(adgroup) !== 'Retargeting Display'; }\n\n  kpis(){\n    const D=this.state.data, sel=this.state.selected;\n    if(!D) return {imprDooh:'—',pant:'—',plays:'—',imprRtg:'—',clicksRtg:'—',ctrRtg:'—',hasRtg:false};\n    const src = (D.daily.length?D.daily:D.dayhour).filter(r=>sel.includes(r.campaign));\n    const dooh = src.filter(r=>this.isDooh(r.adgroup));\n    const rtg  = src.filter(r=>!this.isDooh(r.adgroup));\n    const sum = (arr,f)=>arr.reduce((a,r)=>a+(r[f]||0),0);\n    const imprDooh = sum(dooh,'impressions'), plays = sum(dooh,'plays');\n    const imprRtg  = sum(rtg,'impressions'), clicksRtg = sum(rtg,'clicks');\n    // Pantallas: sites únicos, solo de ad groups DOOH en las campañas seleccionadas\n    const agSel = new Set(D.adgroups.filter(a=>sel.includes(a.campaign) && this.isDooh(a.name)).map(a=>a.name));\n    const sites = new Set();\n    D.site.forEach(r=>{ if(agSel.has(r.adgroup) && r.impressions>0) sites.add(r.site); });\n    return {\n      imprDooh:this.fmt(imprDooh), pant: sites.size? this.fmt(sites.size):'—', plays:this.fmt(plays),\n      imprRtg:this.fmt(imprRtg), clicksRtg:this.fmt(clicksRtg),\n      ctrRtg: imprRtg>0 ? (clicksRtg/imprRtg*100).toFixed(2)+'%' : '—',\n      hasRtg: rtg.length>0 && imprRtg>0\n    };\n  }\n\n  renderVals(){\n    const dropStyle = 'border:2px dashed '+(this.state.drag?'var(--accent,#4472C4)':'var(--line-strong,#00004F)')+';border-radius:14px;background:'+(this.state.drag?'var(--accent-soft,#E4EAF9)':'var(--paper,#fff)')+';padding:48px 28px;text-align:center;cursor:pointer;transition:.15s;box-shadow:0 8px 24px -14px rgba(15,27,51,.18);';\n\n    const base = {\n      rootRef:this.rootRef, chartGridRef:this.chartGridRef,\n      hourCanvas:this.hourCanvas, dayCanvas:this.dayCanvas, lineCanvas:this.lineCanvas,\n      isUpload:this.state.view==='upload', isDashboard:this.state.view==='dashboard',\n      onPickFile:this.onPickFile, onDrop:this.onDrop, onDragOver:this.onDragOver, onDragLeave:this.onDragLeave,\n      dropStyle, onReset:this.onReset,\n      hasError:!!this.state.error, fileError:this.state.error,\n      invTypes:this.INV_TYPES,\n    };\n    if(this.state.view!=='dashboard' || !this.state.data) return base;\n\n    const D=this.state.data, sel=this.state.selected;\n    const campaignChips = D.campaigns.map(c=>{\n      const active = sel.includes(c);\n      return {\n        label:this.shortCamp(c), title:c, onToggle:()=>this.toggleCampaign(c),\n        style:'display:inline-flex;align-items:center;gap:8px;border:1.5px solid '+(active?'var(--accent,#4472C4)':'var(--line,#CBD3E0)')+';background:'+(active?'var(--accent-soft,#E4EAF9)':'var(--paper,#fff)')+';color:var(--ink,#00004F);padding:8px 14px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;font-family:Schibsted Grotesk,sans-serif;',\n        dotStyle:'width:9px;height:9px;border-radius:50%;background:'+(active?'var(--accent,#4472C4)':'var(--faint,#8C93A4)')+';'\n      };\n    });\n\n    const noSelection = sel.length===0;\n    const kp = this.kpis();\n    const split = this.computeInvSplit();\n\n    const adgroupRows = D.adgroups.filter(a=>sel.includes(a.campaign)).map(a=>{\n      const inv=this.invOf(a.name);\n      const rtg=!this.isDooh(a.name);\n      const impr=(D.daily.length?D.daily:D.dayhour).filter(r=>r.adgroup===a.name && sel.includes(r.campaign)).reduce((s,r)=>s+r.impressions,0);\n      return { name:a.name, short:this.shortAg(a.name), campaignShort:this.shortCamp(a.campaign),\n        inv, color:this.invColor(inv), impressionsFmt:this.fmt(impr), imprNum:impr,\n        isRtg:rtg, isDoohRow:!rtg, evol:this.evolOf(a.name),\n        onChange:(e)=>this.setInv(a.name, e.target.value),\n        onEvolChange:(e)=>this.setEvol(a.name, e.target.value) };\n    }).sort((x,y)=> y.imprNum-x.imprNum);\n\n    return Object.assign(base, {\n      campaignChips, noSelection, hasSelection:!noSelection,\n      kpiImpr:kp.imprDooh, kpiPant:kp.pant, kpiPlays:kp.plays,\n      kpiSub: sel.length>1 ? sel.length+' campañas · solo DOOH' : 'solo DOOH',\n      hasRtg:kp.hasRtg, kpiRtgImpr:kp.imprRtg, kpiRtgClicks:kp.clicksRtg, kpiRtgCtr:kp.ctrRtg,\n      invOptionEls: this.INV_TYPES.map(t=>React.createElement('option',{key:t,value:t},t)),\n      evolOptionEls: [{v:'dooh',label:'Como DOOH (agrupado)'},{v:'inventory',label:'Por su inventario'}].map(e=>React.createElement('option',{key:e.v,value:e.v},e.label)),\n      invSplit:split.list, adgroupRows,\n      hourSegInvStyle:this.segStyle(this.state.hourMode==='inv'),\n      hourSegTotalStyle:this.segStyle(this.state.hourMode==='total'),\n      daySegInvStyle:this.segStyle(this.state.dayMode==='inv'),\n      daySegTotalStyle:this.segStyle(this.state.dayMode==='total'),\n      onHourInv:()=>this.setState({hourMode:'inv'}), onHourTotal:()=>this.setState({hourMode:'total'}),\n      onDayInv:()=>this.setState({dayMode:'inv'}), onDayTotal:()=>this.setState({dayMode:'total'})\n    });\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
